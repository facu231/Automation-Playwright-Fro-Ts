name: e2e-tests

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      tags:
        description: Cucumber tag expression
        required: false
        default: '@smoke and not @wip'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    env:
      TEST_ENV: qa
      BROWSER: ${{ matrix.browser }}
      HEADLESS: true
      TRACE: true
      VIDEO: true
      RETRY: 1
      RETRY_TAG_FILTER: '@flaky'
      CUCUMBER_TAGS: ${{ github.event.inputs.tags || '@smoke and not @wip' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}

      - name: Validate framework
        run: pnpm run validate

      - name: Run tests
        run: pnpm run test:ci

      - name: Generate reports
        if: always()
        run: pnpm run report

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-${{ matrix.browser }}
          path: |
            reports/
            screenshots/
            videos/
            traces/
