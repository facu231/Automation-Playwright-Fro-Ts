image: mcr.microsoft.com/playwright:v1.61.1-noble

stages:
  - validate
  - test

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .pnpm-store/

before_script:
  - corepack enable
  - pnpm config set store-dir .pnpm-store
  - pnpm install --frozen-lockfile

validate:
  stage: validate
  script:
    - pnpm run validate

e2e:
  stage: test
  parallel:
    matrix:
      - BROWSER: [chromium, firefox, webkit]
  variables:
    TEST_ENV: qa
    HEADLESS: 'true'
    TRACE: 'true'
    VIDEO: 'true'
    RETRY: '1'
    RETRY_TAG_FILTER: '@flaky'
    CUCUMBER_TAGS: '@smoke and not @wip'
  script:
    - pnpm exec playwright install --with-deps ${BROWSER}
    - pnpm run test:ci
  after_script:
    - pnpm run report || true
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - reports/
      - screenshots/
      - videos/
      - traces/
